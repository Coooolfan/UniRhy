name: UniRhy CD
run-name: CD ${{ inputs.version }}${{ inputs.latest && ' (latest)' || '' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号：例如 0.1.0-rc.1 或 0.1.0"
        required: true
        type: string
      latest:
        description: "设为默认版本：推送 Docker latest、标记 GitHub Release Latest，并部署官网"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: cd-${{ inputs.version }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  YARN_VERSION: "4.12.0"
  JAVA_VERSION: "25"

jobs:
  prepare-release:
    name: 准备发布上下文
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
      publish_latest: ${{ steps.prepare.outputs.publish_latest }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 校验版本与目标引用
        id: prepare
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_LATEST: ${{ inputs.latest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/release/prepare-release.sh

      - name: 输出发布摘要
        run: |
          {
            echo "## UniRhy Release"
            echo
            echo "- Version: \`${{ steps.prepare.outputs.version }}\`"
            echo "- Workflow ref: \`${{ github.ref_name }}\`"
            echo "- Target SHA: \`${{ steps.prepare.outputs.target_sha }}\`"
            echo "- Prerelease: \`${{ steps.prepare.outputs.prerelease }}\`"
            echo "- Latest: \`${{ steps.prepare.outputs.publish_latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-frontend:
    name: 构建前端资源
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: web/.yarn/cache
          key: ${{ runner.os }}-yarn-web-${{ hashFiles('web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-web-

      - name: 构建前端
        run: |
          yarn --version
          yarn install --immutable
          yarn verify
          yarn format:check
          yarn build

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error

  build-website:
    name: 构建官网资源
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: website/.yarn/cache
          key: ${{ runner.os }}-yarn-website-${{ hashFiles('website/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-website-

      - name: 构建官网
        run: |
          yarn --version
          yarn install --immutable
          yarn verify
          yarn format:check
          yarn build

      - name: 上传官网产物
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist
          if-no-files-found: error

  build-jar:
    name: 构建 JAR 包
    needs:
      - prepare-release
      - build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 JDK 环境
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('server/**/*.gradle*', 'server/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: server/src/main/resources/static

      - name: 编译 JAR 包
        working-directory: ./server
        run: |
          chmod +x ./gradlew
          ./gradlew :compileKotlin :test bootJar
          ./gradlew --stop || true

      - name: 整理 JAR 产物
        working-directory: ./server/build/libs
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          JAR_FILE="$(ls *.jar | grep -v plain | head -n 1)"
          test -n "$JAR_FILE"
          mv "$JAR_FILE" "unirhy-v${VERSION}.jar"
          ls -al "unirhy-v${VERSION}.jar"

      - name: 上传 JAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: server/build/libs/unirhy-v${{ needs.prepare-release.outputs.version }}.jar
          if-no-files-found: error

  create-draft-release:
    name: 创建 tag 与草稿 Release
    needs:
      - prepare-release
      - build-jar
      - build-website
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 创建 tag 与草稿 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          TARGET_SHA: ${{ needs.prepare-release.outputs.target_sha }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: ./.github/scripts/release/create-draft-release.sh

  upload-release-assets:
    name: 上传产物到 Release
    needs:
      - prepare-release
      - create-draft-release
    runs-on: ubuntu-latest
    steps:
      - name: 下载 JAR 产物
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: dist

      - name: 上传到 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          ls -R dist
          gh release upload "$VERSION" "dist/unirhy-v${VERSION}.jar" --clobber

  build-docker-for-jvm:
    name: 构建并推送 Docker 镜像
    needs:
      - prepare-release
      - create-draft-release
      - deploy-cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 下载 JAR 产物
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: dist

      - name: 登录到 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像 tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/unirhy
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.jvm
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            JAR_FILE=dist/unirhy-v${{ needs.prepare-release.outputs.version }}.jar

  deploy-cloudflare:
    name: 部署官网到 Cloudflare Workers
    needs:
      - prepare-release
      - create-draft-release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 下载官网产物
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist

      - name: 上传版本（不切生产流量）
        if: needs.prepare-release.outputs.publish_latest != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.107.0"
          command: versions upload --tag ${{ needs.prepare-release.outputs.version }} --message "Release ${{ needs.prepare-release.outputs.version }}"

      - name: 部署到生产（上传并切 100% 流量）
        if: needs.prepare-release.outputs.publish_latest == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.107.0"
          command: deploy

  publish-release:
    name: 发布 Release
    needs:
      - prepare-release
      - upload-release-assets
      - build-docker-for-jvm
      - deploy-cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: 切换 Release 为发布态
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PUBLISH_LATEST: ${{ needs.prepare-release.outputs.publish_latest }}
        run: |
          set -euo pipefail
          case "$PUBLISH_LATEST" in
            true | false) ;;
            *)
              echo "::error::PUBLISH_LATEST 必须是 true 或 false，当前为 $PUBLISH_LATEST"
              exit 1
              ;;
          esac
          RELEASE_ID="$(gh release view "$VERSION" --json databaseId --jq .databaseId)"
          gh api --method PATCH "repos/{owner}/{repo}/releases/$RELEASE_ID" \
            -F draft=false \
            -F "make_latest=$PUBLISH_LATEST" \
            --silent
