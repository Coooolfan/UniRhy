name: UniRhy CD
run-name: CD ${{ inputs.version }}${{ inputs.latest && ' (latest)' || '' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号：例如 0.1.0-rc.1 或 0.1.0"
        required: true
        type: string
      latest:
        description: "设为默认版本：推送 Docker latest、标记 GitHub Release Latest，并部署官网"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: cd-${{ inputs.version }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  YARN_VERSION: "4.12.0"
  JAVA_VERSION: "25"
  ANDROID_JAVA_VERSION: "21"

jobs:
  prepare-release:
    name: 准备发布上下文
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
      publish_latest: ${{ steps.prepare.outputs.publish_latest }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 校验版本与目标引用
        id: prepare
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_LATEST: ${{ inputs.latest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/release/prepare-release.sh

      - name: 输出发布摘要
        run: |
          {
            echo "## UniRhy Release"
            echo
            echo "- Version: \`${{ steps.prepare.outputs.version }}\`"
            echo "- Workflow ref: \`${{ github.ref_name }}\`"
            echo "- Target SHA: \`${{ steps.prepare.outputs.target_sha }}\`"
            echo "- Prerelease: \`${{ steps.prepare.outputs.prerelease }}\`"
            echo "- Latest: \`${{ steps.prepare.outputs.publish_latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-frontend:
    name: 构建前端资源
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: web/.yarn/cache
          key: ${{ runner.os }}-yarn-web-${{ hashFiles('web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-web-

      - name: 构建前端
        run: |
          yarn --version
          yarn install --immutable
          yarn verify
          yarn format:check
          yarn build

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error

  build-website:
    name: 构建官网资源
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: website/.yarn/cache
          key: ${{ runner.os }}-yarn-website-${{ hashFiles('website/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-website-

      - name: 构建官网
        run: |
          yarn --version
          yarn install --immutable
          yarn verify
          yarn format:check
          yarn build

      - name: 上传官网产物
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist
          if-no-files-found: error

  build-desktop-macos:
    name: 构建 macOS 桌面应用
    needs: prepare-release
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: web/.yarn/cache
          key: ${{ runner.os }}-yarn-web-${{ hashFiles('web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-web-

      - name: 设置 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('web/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 构建 Tauri 应用
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          yarn --version
          yarn install --immutable
          yarn tauri build --config "{\"version\":\"${VERSION}\",\"build\":{\"beforeBuildCommand\":\"yarn build\"},\"bundle\":{\"active\":true,\"targets\":[\"dmg\"]}}"

      - name: 整理 DMG 产物
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          DMG_FILE="$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)"
          test -n "$DMG_FILE"
          OUT_DMG="src-tauri/target/release/bundle/dmg/unirhy-v${VERSION}-macos-arm64.dmg"
          mv "$DMG_FILE" "$OUT_DMG"

          # 用硬盘造型图标替换 DMG 卷图标（详见脚本内说明）
          DMG_FILE="$OUT_DMG" ICNS_FILE="src-tauri/icons/dmg-volume.icns" \
            bash "$GITHUB_WORKSPACE/.github/scripts/release/apply-dmg-volume-icon.sh"

          ls -al "$OUT_DMG"

      - name: 上传桌面产物
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: web/src-tauri/target/release/bundle/dmg/unirhy-v${{ needs.prepare-release.outputs.version }}-macos-arm64.dmg
          if-no-files-found: error

  build-desktop-windows:
    name: 构建 Windows 桌面应用
    needs: prepare-release
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./web
        shell: bash
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: web/.yarn/cache
          key: ${{ runner.os }}-yarn-web-${{ hashFiles('web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-web-

      - name: 设置 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('web/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 构建 Tauri 应用
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          yarn --version
          yarn install --immutable
          yarn tauri build --bundles nsis --config "{\"version\":\"${VERSION}\",\"build\":{\"beforeBuildCommand\":\"yarn build\"}}"

      - name: 整理 NSIS 产物
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          EXE_FILE="$(ls src-tauri/target/release/bundle/nsis/*.exe | head -n 1)"
          test -n "$EXE_FILE"
          mv "$EXE_FILE" "src-tauri/target/release/bundle/nsis/unirhy-v${VERSION}-windows-x64-setup.exe"
          ls -al "src-tauri/target/release/bundle/nsis/unirhy-v${VERSION}-windows-x64-setup.exe"

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: web/src-tauri/target/release/bundle/nsis/unirhy-v${{ needs.prepare-release.outputs.version }}-windows-x64-setup.exe
          if-no-files-found: error

  build-android-arm64:
    name: 构建 Android arm64 应用
    needs: prepare-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v4
        with:
          path: web/.yarn/cache
          key: ${{ runner.os }}-yarn-web-${{ hashFiles('web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-web-

      - name: 设置 JDK 环境
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.ANDROID_JAVA_VERSION }}
          distribution: temurin

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 设置 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            web/src-tauri/target
          key: ${{ runner.os }}-cargo-android-arm64-${{ hashFiles('web/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-arm64-
            ${{ runner.os }}-cargo-

      - name: 准备 Android 签名证书
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          mkdir -p "$RUNNER_TEMP/android-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/unirhy-release.p12"

      - name: 构建 Android 应用
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-signing/unirhy-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          yarn --version
          yarn install --immutable
          yarn tauri android build --target aarch64 --split-per-abi --apk --ci --config "{\"version\":\"${VERSION}\",\"build\":{\"beforeBuildCommand\":\"yarn build\"}}"

      - name: 整理 Android 产物
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p src-tauri/gen/android/release-assets
          APK_FILE="$(find src-tauri/gen/android/app/build/outputs -type f -name '*.apk' ! -name '*-unsigned.apk' | head -n 1)"
          test -n "$APK_FILE"
          cp "$APK_FILE" "src-tauri/gen/android/release-assets/unirhy-v${VERSION}-android-arm64.apk"
          ls -al src-tauri/gen/android/release-assets

      - name: 上传 Android 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: |
            web/src-tauri/gen/android/release-assets/unirhy-v${{ needs.prepare-release.outputs.version }}-android-arm64.apk
          if-no-files-found: error

  build-jar:
    name: 构建 JAR 包
    needs:
      - prepare-release
      - build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 JDK 环境
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('server/**/*.gradle*', 'server/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: server/src/main/resources/static

      - name: 编译 JAR 包
        working-directory: ./server
        run: |
          chmod +x ./gradlew
          ./gradlew :compileKotlin :test bootJar
          ./gradlew --stop || true

      - name: 整理 JAR 产物
        working-directory: ./server/build/libs
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          JAR_FILE="$(ls *.jar | grep -v plain | head -n 1)"
          test -n "$JAR_FILE"
          mv "$JAR_FILE" "unirhy-v${VERSION}.jar"
          ls -al "unirhy-v${VERSION}.jar"

      - name: 上传 JAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: server/build/libs/unirhy-v${{ needs.prepare-release.outputs.version }}.jar
          if-no-files-found: error

  create-draft-release:
    name: 创建 tag 与草稿 Release
    needs:
      - prepare-release
      - build-jar
      - build-website
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 创建 tag 与草稿 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          TARGET_SHA: ${{ needs.prepare-release.outputs.target_sha }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: ./.github/scripts/release/create-draft-release.sh

  upload-release-assets:
    name: 上传产物到 Release
    needs:
      - prepare-release
      - create-draft-release
      - build-desktop-macos
      - build-desktop-windows
      - build-android-arm64
    runs-on: ubuntu-latest
    steps:
      - name: 下载 JAR 产物
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: dist

      - name: 下载桌面产物
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: dist

      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: dist

      - name: 下载 Android 产物
        uses: actions/download-artifact@v4
        with:
          name: android-arm64
          path: dist

      - name: 上传到 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          ls -R dist
          gh release upload "$VERSION" \
            "dist/unirhy-v${VERSION}.jar" \
            "dist/unirhy-v${VERSION}-macos-arm64.dmg" \
            "dist/unirhy-v${VERSION}-windows-x64-setup.exe" \
            "dist/unirhy-v${VERSION}-android-arm64.apk" \
            --clobber

  build-docker-for-jvm:
    name: 构建并推送 Docker 镜像
    needs:
      - prepare-release
      - create-draft-release
      - deploy-cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 下载 JAR 产物
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: dist

      - name: 登录到 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像 tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/unirhy
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.jvm
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            JAR_FILE=dist/unirhy-v${{ needs.prepare-release.outputs.version }}.jar

  deploy-cloudflare:
    name: 部署官网到 Cloudflare Workers
    needs:
      - prepare-release
      - create-draft-release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: 下载官网产物
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist

      - name: 上传版本（不切生产流量）
        if: needs.prepare-release.outputs.publish_latest != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.107.0"
          workingDirectory: website
          command: versions upload --tag ${{ needs.prepare-release.outputs.version }} --message "Release ${{ needs.prepare-release.outputs.version }}"

      - name: 部署到生产（上传并切 100% 流量）
        if: needs.prepare-release.outputs.publish_latest == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.107.0"
          workingDirectory: website
          command: deploy

  publish-release:
    name: 发布 Release
    needs:
      - prepare-release
      - upload-release-assets
      - build-docker-for-jvm
      - deploy-cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: 切换 Release 为发布态
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PUBLISH_LATEST: ${{ needs.prepare-release.outputs.publish_latest }}
        run: |
          set -euo pipefail
          case "$PUBLISH_LATEST" in
            true | false) ;;
            *)
              echo "::error::PUBLISH_LATEST 必须是 true 或 false，当前为 $PUBLISH_LATEST"
              exit 1
              ;;
          esac
          RELEASE_ID="$(gh release view "$VERSION" --json databaseId --jq .databaseId)"
          gh api --method PATCH "repos/{owner}/{repo}/releases/$RELEASE_ID" \
            -F draft=false \
            -F "make_latest=$PUBLISH_LATEST" \
            --silent
