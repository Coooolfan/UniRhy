name: UniRhy CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  YARN_VERSION: "4.12.0"
  JAVA_VERSION: "25"

jobs:
  check-web:
    name: 检查前端 (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node 环境
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v6
        with:
          path: web/.yarn/cache
          key: ${{ runner.os }}-yarn-web-${{ hashFiles('web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-web-

      - name: 安装依赖
        run: yarn install --immutable

      - name: Lint、类型检查与格式检查
        run: yarn verify && yarn format:check

      - name: 单元测试
        run: yarn test:unit --run
        env:
          NODE_OPTIONS: --localstorage-file=${{ runner.temp }}/unirhy-web-localstorage.json

      - name: 构建
        run: yarn build

  check-website:
    name: 检查官网 (website)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node 环境
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 启用 Corepack 并激活 Yarn
        run: |
          corepack enable
          corepack prepare yarn@${{ env.YARN_VERSION }} --activate

      - name: 缓存 Yarn 包缓存
        uses: actions/cache@v6
        with:
          path: website/.yarn/cache
          key: ${{ runner.os }}-yarn-website-${{ hashFiles('website/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-website-

      - name: 安装依赖
        run: yarn install --immutable

      - name: Lint、类型检查与格式检查
        run: yarn verify && yarn format:check

      - name: 构建
        run: yarn build

  check-server:
    name: 检查后端 (server)
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 JDK 环境
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('server/**/*.gradle*', 'server/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 编译与单元测试
        working-directory: ./server
        run: |
          chmod +x ./gradlew
          ./gradlew :compileKotlin :test
          ./gradlew --stop || true
