server:
  port: ${SERVER_PORT:8654}
  tomcat:
    max-swallow-size: -1
spring:
  application:
    name: unirhy
  mvc:
    async:
      # 媒体文件以 StreamingResponseBody 流式下发，客户端（ExoPlayer 等）会按缓冲水位暂停读取，
      # 容器默认异步超时会在写入停滞约 30s 后中止响应，导致播放中断，故禁用
      request-timeout: -1
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:true}
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${POSTGRES_DB:unirhy}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}

jimmer:
  language: kotlin
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect
  show-sql: ${JIMMER_SHOW_SQL:false}
  pretty-sql: ${JIMMER_PRETTY_SQL:false}
  inline-sql-variables: ${JIMMER_INLINE_SQL_VARIABLES:false}
  database-validation-mode: ${JIMMER_DB_VALIDATION_MODE:ERROR}

  client:
    enable: ${JIMMER_CLIENT_ENABLE:false}
    openapi:
      path: ${JIMMER_OPENAPI_YML_PATH:/api/openapi.yml}
      properties:
        info:
          title: UniRhy API
          description: UniRhy API Documentation
          version: v0.0.1
    ts:
      path: ${JIMMER_TS_PATH:/api/openapi.zip}

sa-token:
  is-print: ${SA_TOKEN_IS_PRINT:true}
  token-name: ${SA_TOKEN_NAME:unirhy-token}
  is-read-cookie: ${SA_TOKEN_IS_READ_COOKIE:true}
  is-read-header: ${SA_TOKEN_IS_READ_HEADER:true}
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:${UNIRHY_SECRET_KEY:}}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %-19(%cyan(%-19.19logger{0})) : %msg%n"

unirhy:
  cors:
    allowed-origins: ${UNIRHY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  media:
    signing-key: ${UNIRHY_MEDIA_SIGNING_KEY:${UNIRHY_SECRET_KEY:}}
    url-ttl-seconds: ${UNIRHY_MEDIA_URL_TTL_SECONDS:7200}
